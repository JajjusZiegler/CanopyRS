# Multi-enhancement RGB ensemble detection pipeline for MicaSense Altum-PT rasters
# (Metashape 7-band export: Blue=1, Green=2, Red=3, RE=4, NIR=5, Thermal=6, Alpha=7)
#
# Detection is performed on five RGB enhancement variants of every tile.  The
# per-method detections are WBF-fused (IoU=0.4) inside DetectorComponent before
# being passed to the aggregator and SAM3 segmenter.
#
# Run with:
#   python infer.py -c preset_det_multi_NQOS_dino_swinL_altumpt_rgb_ensemble \
#          -i /path/to/altumpt.tif -o /path/to/output --no-strict-rgb
#
# Add  --multispectral-imagery /path/to/altumpt.tif  to also enable the SAM3
# multispectral VI stream for segmentation (requires ms_index_type in segmenter).

components_configs:
  - tilerizer:
      tile_type: tile
      tile_size: 1777
      tile_overlap: 0.75
      ground_resolution: 0.045
      rgb_band_indices: [3, 2, 1]   # Red(3), Green(2), Blue(1) — Altum-PT Metashape order

  - rgb_enhancer:
      detection_methods:
        - gamma_wb       # gamma 2.2 + white-balance to M3M target stats
        - blend_wb_sc    # 60% gamma_wb + 40% scurve blend
        - stat_wt        # auto-weighted ensemble of 5 base methods
        - scurve         # sigmoidal contrast (S-curve)
        - white_balance  # white-balance only (no gamma)
      target_means: [73.1, 88.2, 44.0]
      target_stds:  [55.2, 58.2, 37.1]
      nir_band_index: 4   # Altum-PT band 5 → 0-based index 4

  - detector: detectors/dino_swinL_multi_NQOS_selvamask_FT.yaml

  - aggregator:
      nms_algorithm: 'iou'
      score_threshold: 0.4
      nms_threshold: 0.7
      edge_band_buffer_percentage: 0.05
      scores_weights: {'detector_score': 1.0}

  - segmenter: segmenters/sam3_multi_selvamask_FT_ensemble.yaml

  - aggregator:
      nms_algorithm: 'ioa-disambiguate'
      score_threshold: 0.6
      nms_threshold: 0.05
      edge_band_buffer_percentage: 0.05
      scores_weights: {'detector_score': 0.5, 'segmenter_score': 0.5}
      scores_weighting_method: 'weighted_geometric_mean'
