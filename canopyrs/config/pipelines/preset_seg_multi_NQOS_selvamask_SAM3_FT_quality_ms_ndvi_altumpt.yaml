# SAM3 quality ensemble + Altum-PT NDVI dual-stream pipeline
#
# Designed for MicaSense Altum-PT 7-band Metashape exports (band order:
# Blue=1, Green=2, Red=3, RE=4, NIR=5, Thermal=6, Alpha=7).
#
# ─── What this pipeline does ────────────────────────────────────────────────
# tilerizer → detector → aggregator(IoU) → segmenter(SAM3 + NDVI) → aggregator(IoA)
#
#   1. Tilerizer reorders bands to [Red, Green, Blue] for the RGB tiles.
#      When -ms points to the same (or co-registered) Altum-PT raster, it also
#      creates full-band MS tiles in ms_tiles/ for dual-stream inference.
#   2. Detector (DINO SwinL) runs on the RGB tiles.
#   3. First aggregator deduplicates cross-tile boxes with IoU NMS.
#   4. SAM3 quality ensemble runs on each tile, with 5 jittered runs per box
#      averaged via heatmap thresholding.  For each detected crown the mask
#      predicted from the NDVI greyscale tile is compared to the RGB mask; the
#      one with the higher predicted IoU score is kept.
#   5. Second aggregator resolves overlapping polygons with ioa-disambiguate.
#
# ─── Usage ──────────────────────────────────────────────────────────────────
#   python infer.py \
#       -c preset_seg_multi_NQOS_selvamask_SAM3_FT_quality_ms_ndvi_altumpt \
#       -i  /path/to/altumpt_ortho.tif \
#       -ms /path/to/altumpt_ortho.tif \
#       -o  /tmp/canopyrs_ms_ndvi_test \
#       --no-strict-rgb
# ────────────────────────────────────────────────────────────────────────────

components_configs:
  - tilerizer:
      tile_type: tile
      tile_size: 1777
      tile_overlap: 0.75
      ground_resolution: 0.045
      rgb_band_indices: [3, 2, 1]   # Red(3), Green(2), Blue(1) — Altum-PT Metashape order

  - detector: detectors/dino_swinL_multi_NQOS_selvamask_FT.yaml

  - aggregator:
      nms_algorithm: 'iou'
      score_threshold: 0.4
      nms_threshold: 0.7
      edge_band_buffer_percentage: 0.05
      scores_weights: { 'detector_score': 1.0 }

  - segmenter: segmenters/sam3_multi_selvamask_FT_ensemble_ms_ndvi.yaml

  - aggregator:
      nms_algorithm: 'ioa-disambiguate'
      score_threshold: 0.6
      nms_threshold: 0.05
      edge_band_buffer_percentage: 0.05
      scores_weights: {'detector_score': 0.5, 'segmenter_score': 0.5}
      scores_weighting_method: 'weighted_geometric_mean'
